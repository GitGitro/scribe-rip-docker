services:
    scribe:
        image: ghcr.io/gitgitro/scribe-rip-docker:main
        ports:
            - 8080:8080
        environment:
            - SCRIBE_PORT=8080
            - SCRIBE_HOST=0.0.0.0
            - SECRET_KEY_BASE= #A 32-bit string. Can be generated with lucky gen.secret_key
            - GITHUB_PERSONAL_ACCESS_TOKEN= #to proxy gists with authenticated GitHub API requests
            - GITHUB_USERNAME= #to proxy gists with authenticated GitHub API requests
            - APP_DOMAIN= #to allow your domain to show up on the homepage, note that this only takes effect if the LUCKY_ENV environment variable is also set to production
            - LUCKY_ENV=production 
        